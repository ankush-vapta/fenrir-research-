services:
  postgres:
    image: postgres:16-alpine
    container_name: fenrir-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fenrir
      POSTGRES_PASSWORD: fenrir_secret
      POSTGRES_DB: fenrir_research
    volumes:
      - fenrir_pg_data:/var/lib/postgresql/data

volumes:
  fenrir_pg_data:
